name: CI

# Lint and test the Python package on every push to main and every PR.
# Fast (under a minute); the Docker image build lives in docker.yml so
# that the slow path only runs when it has to.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast-follow push doesn't
# leave old jobs hogging runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege. Nothing in this workflow needs write
# access to the repo or to packages.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.4"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.4"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }} --frozen

      - name: Run pytest with coverage
        run: >-
          uv run --python ${{ matrix.python-version }}
          pytest
          --cov=hn_fdw
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7

  # Quick offline smoke of the CLI: no network, no Postgres, no DuckDB
  # file. Just confirms the SQL generators don't regress. A full
  # container bring-up lives in docker.yml.
  sql-smoke:
    name: SQL generator smoke
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.4"
          enable-cache: true

      - name: Sync
        run: uv sync --frozen

      - name: hn-fdw sql duckdb
        run: uv run hn-fdw sql duckdb | head -40

      - name: hn-fdw sql postgres
        run: uv run hn-fdw sql postgres | head -40

      - name: hn-fdw version
        run: uv run hn-fdw version
